<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TuitionPlanner – Monthly Schedule</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TuitionPlanner">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root {
    --primary: #6366f1;
    --primary-light: #eef2ff;
    --primary-dark: #4f46e5;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --bg: #f8fafc;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --sidebar-w: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
  }
  .sidebar-logo { padding: 20px 18px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-logo h1 { font-size: 17px; font-weight: 700; color: var(--primary); }
  .sidebar-logo p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 12px 10px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted); margin-bottom: 3px; transition: all .15s; }
  .nav-item:hover { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .nav-icon { font-size: 17px; width: 22px; text-align: center; }
  .sidebar-footer { padding: 10px 10px 16px; border-top: 1px solid var(--border); }

  /* ── Hamburger ── */
  .hamburger { display: none; position: fixed; top: 12px; left: 12px; z-index: 200; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; cursor: pointer; font-size: 18px; box-shadow: var(--shadow,0 1px 3px rgba(0,0,0,.08)); }
  .overlay-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 99; }

  /* ── Main ── */
  #main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }
  .page { display: none; padding: 24px; }
  .page.active { display: block; }
  .page-header { margin-bottom: 20px; }
  .page-title { font-size: 22px; font-weight: 700; }
  .page-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .card-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; text-decoration: none; }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
  .btn-outline { background: var(--surface); color: var(--text); border-color: var(--border); }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .btn-danger  { background: #fef2f2; color: var(--danger); border-color: #fecaca; }
  .btn-danger:hover { background: #fee2e2; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { background: none; border: none; cursor: pointer; font-size: 17px; padding: 4px; color: var(--muted); border-radius: 6px; }
  .btn-icon:hover { background: var(--bg); }

  /* ── Form ── */
  .form-group { margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
  input, select, textarea { width: 100%; padding: 8px 11px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--surface); color: var(--text); transition: border .15s; font-family: inherit; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
  textarea { resize: vertical; min-height: 68px; }

  /* ── Badge ── */
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-success { background: #dcfce7; color: #166534; }
  .badge-warning { background: #fffbeb; color: #92400e; }
  .badge-danger  { background: #fef2f2; color: #991b1b; }
  .badge-info    { background: #eff6ff; color: #1e40af; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.18); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .modal-header h3 { font-size: 16px; font-weight: 700; }
  .modal-body { padding: 18px; }
  .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 9999; white-space: nowrap; }
  #toast.show { opacity: 1; }

  /* ── Dashboard stats ── */
  .dash-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .stat-val { font-size: 26px; font-weight: 800; color: var(--primary); }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Session list ── */
  .session-item { display: flex; align-items: flex-start; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .session-item:last-child { border-bottom: none; }
  .session-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .session-info { flex: 1; min-width: 0; }
  .session-name { font-size: 14px; font-weight: 600; }
  .session-sub  { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .session-right { text-align: right; flex-shrink: 0; }
  .session-time  { font-size: 12px; color: var(--muted); }

  /* ── Week mini-calendar ── */
  .week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .week-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .week-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
  .week-num { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; cursor: pointer; }
  .week-num.today { background: var(--primary); color: #fff; }
  .week-num.has-sess { background: var(--primary-light); color: var(--primary); }
  .week-num:hover { background: var(--primary-light); color: var(--primary); }
  .week-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
  .week-dot { width: 5px; height: 5px; border-radius: 50%; }

  /* ── Students grid ── */
  .students-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 14px; }
  .student-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .student-card-top { padding: 14px 16px 10px; display: flex; align-items: center; gap: 12px; }
  .student-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 800; color: #fff; flex-shrink: 0; }
  .student-name { font-size: 15px; font-weight: 700; }
  .student-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .student-card-mid { padding: 0 16px 12px; }
  .student-card-actions { display: flex; gap: 6px; padding: 10px 16px; border-top: 1px solid var(--border); }

  /* ── Schedule table ── */
  .sched-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .sched-table { width: 100%; border-collapse: collapse; }
  .sched-table th { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
  .sched-table td { padding: 10px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .sched-table tr:last-child td { border-bottom: none; }
  .sched-table tr:hover td { background: var(--bg); }

  /* ── Fee cards ── */
  .fee-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 12px; }
  .fee-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .fee-name { font-weight: 700; font-size: 15px; }
  .fee-amount { font-size: 22px; font-weight: 800; margin: 6px 0 2px; }
  .fee-detail { font-size: 11px; color: var(--muted); }

  /* ── Colour swatches ── */
  .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: transform .1s; }
  .color-swatch.sel { border-color: #1e293b; transform: scale(1.2); }

  /* ── Mobile ── */
  @media(max-width:768px) {
    #sidebar { transform: translateX(-100%); transition: transform .25s; z-index: 150; }
    #sidebar.open { transform: none; }
    .overlay-bg.open { display: block; }
    .hamburger { display: block; }
    #main { margin-left: 0; }
    .page { padding: 14px; padding-top: 52px; }
    .dash-stats { grid-template-columns: repeat(2,1fr); gap: 8px; }
    .form-row { grid-template-columns: 1fr; }
    .week-num { width: 26px; height: 26px; font-size: 11px; }
  }
  @media(max-width:480px) {
    .students-grid { grid-template-columns: 1fr; }
    .fee-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay-bg" id="overlay-bg" onclick="closeSidebar()"></div>

<nav id="sidebar">
  <div class="sidebar-logo">
    <h1>✏️ TuitionPlanner</h1>
    <p>Tutor Dashboard</p>
  </div>
  <div class="sidebar-nav">
    <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')"><span class="nav-icon">🏠</span> Dashboard</div>
    <div class="nav-item" id="nav-students"  onclick="navigate('students')"> <span class="nav-icon">👥</span> Students</div>
    <div class="nav-item" id="nav-schedule"  onclick="navigate('schedule')"> <span class="nav-icon">📅</span> Schedule</div>
    <div class="nav-item" id="nav-fees"      onclick="navigate('fees')">     <span class="nav-icon">💰</span> Fees</div>
  </div>
  <div class="sidebar-footer">
    <div class="nav-item" onclick="window.print()"><span class="nav-icon">🖨️</span> Print</div>
  </div>
</nav>

<div id="main">

  <!-- ── Dashboard ── -->
  <div class="page active" id="page-dashboard">
    <div class="page-header">
      <div class="page-title" id="dash-title">Dashboard</div>
      <div class="page-sub"  id="dash-sub"></div>
    </div>
    <div class="dash-stats">
      <div class="stat-card"><div class="stat-val" id="s-today">0</div><div class="stat-lbl">Today's classes</div></div>
      <div class="stat-card"><div class="stat-val" id="s-week">0</div> <div class="stat-lbl">This week</div></div>
      <div class="stat-card"><div class="stat-val" id="s-stu">0</div>  <div class="stat-lbl">Students</div></div>
      <div class="stat-card"><div class="stat-val" id="s-mon">0</div>  <div class="stat-lbl">This month</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div class="card-title" style="margin:0">📅 Week</div>
          <div style="display:flex;gap:4px;">
            <button class="btn btn-outline btn-sm" onclick="weekOff--;renderDash()">‹</button>
            <button class="btn btn-outline btn-sm" onclick="weekOff++;renderDash()">›</button>
          </div>
        </div>
        <div id="week-grid" class="week-grid"></div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div class="card-title" style="margin:0">📍 Today's Sessions</div>
          <button class="btn btn-primary btn-sm" onclick="openSessModal()">+ Add</button>
        </div>
        <div id="today-list"></div>
      </div>
    </div>
  </div>

  <!-- ── Students ── -->
  <div class="page" id="page-students">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
      <div><div class="page-title">Students</div><div class="page-sub" id="stu-count"></div></div>
      <button class="btn btn-primary" onclick="openStuModal()">+ Add Student</button>
    </div>
    <div id="stu-grid" class="students-grid"></div>
  </div>

  <!-- ── Schedule ── -->
  <div class="page" id="page-schedule">
    <div class="page-header"><div class="page-title">Schedule</div></div>
    <div class="card">
      <div class="sched-controls">
        <select id="f-stu" onchange="renderSched()" style="min-width:150px;width:auto;"></select>
        <select id="f-mon" onchange="renderSched()" style="min-width:130px;width:auto;"></select>
        <select id="f-sta" onchange="renderSched()" style="min-width:120px;width:auto;">
          <option value="">All Status</option>
          <option value="scheduled">Scheduled</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
          <option value="missed">Missed</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="openSessModal()">+ Session</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="sched-table">
          <thead><tr><th>Date</th><th>Student</th><th>Time</th><th>Subject</th><th>Status</th><th></th></tr></thead>
          <tbody id="sched-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── Fees ── -->
  <div class="page" id="page-fees">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
      <div><div class="page-title">Fees</div><div class="page-sub" id="fee-month-lbl"></div></div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-outline btn-sm" onclick="feeOff--;renderFees()">‹</button>
        <button class="btn btn-outline btn-sm" onclick="feeOff++;renderFees()">›</button>
      </div>
    </div>
    <div id="fee-summary" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;"></div>
    <div id="fee-grid" class="fee-grid"></div>
  </div>

</div><!-- #main -->

<!-- ══ MODALS ══ -->

<!-- Student modal -->
<div class="modal-overlay" id="m-student">
  <div class="modal">
    <div class="modal-header">
      <h3 id="m-stu-title">Add Student</h3>
      <button class="btn-icon" onclick="closeModal('m-student')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="stu-id">
      <div class="form-row">
        <div class="form-group"><label>Name *</label><input id="stu-name" placeholder="e.g. Aryan Sharma"></div>
        <div class="form-group"><label>Grade</label>
          <select id="stu-grade">
            <option value="">— Select grade —</option>
            <option>Nursery</option><option>Jr. KG</option><option>Sr. KG</option>
            <option>Grade 1</option><option>Grade 2</option><option>Grade 3</option>
            <option>Grade 4</option><option>Grade 5</option><option>Grade 6</option>
            <option>Grade 7</option><option>Grade 8</option><option>Grade 9</option>
            <option>Grade 10</option><option>Grade 11</option><option>Grade 12</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Parent / Guardian</label><input id="stu-parent" placeholder="e.g. Ramesh Sharma"></div>
        <div class="form-group"><label>Parent Phone</label><input id="stu-phone" type="tel" placeholder="e.g. 9876543210"></div>
      </div>
      <div class="form-group"><label>Subjects</label><input id="stu-subj" placeholder="e.g. Maths, Science"></div>
      <div class="form-row">
        <div class="form-group"><label>Fee (₹)</label><input id="stu-fee" type="number" placeholder="500"></div>
        <div class="form-group"><label>Fee Type</label>
          <select id="stu-fee-type">
            <option value="session">Per Session</option>
            <option value="monthly">Monthly</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Colour</label>
        <div id="color-swatches" class="color-swatches" style="margin-top:6px;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('m-student')">Cancel</button>
      <button class="btn btn-primary" onclick="saveStu()">Save</button>
    </div>
  </div>
</div>

<!-- Session modal -->
<div class="modal-overlay" id="m-session">
  <div class="modal">
    <div class="modal-header">
      <h3 id="m-sess-title">Add Session</h3>
      <button class="btn-icon" onclick="closeModal('m-session')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="sess-id">
      <div class="form-row">
        <div class="form-group"><label>Student *</label><select id="sess-stu"></select></div>
        <div class="form-group"><label>Date *</label><input id="sess-date" type="date"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Start</label><input id="sess-start" type="time"></div>
        <div class="form-group"><label>End</label><input id="sess-end" type="time"></div>
      </div>
      <div class="form-group"><label>Subject / Topic</label><input id="sess-subj" placeholder="e.g. Algebra Ch 3"></div>
      <div class="form-group"><label>Status</label>
        <select id="sess-status" onchange="toggleCancelBy()">
          <option value="scheduled">Scheduled</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
          <option value="missed">Missed</option>
        </select>
      </div>
      <div class="form-group" id="cancel-by-grp" style="display:none;">
        <label>Cancelled By</label>
        <select id="sess-cby"><option value="tutor">Tutor</option><option value="student">Student</option></select>
      </div>
      <div class="form-group"><label>Lesson Plan / Topics Covered</label><textarea id="sess-lesson" placeholder="What was taught…"></textarea></div>
      <div class="form-group"><label>Comment for Parent</label><textarea id="sess-comment" placeholder="Note for the parent…"></textarea></div>
      <div class="form-group"><label>Internal Notes</label><textarea id="sess-notes" placeholder="Private notes…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('m-session')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSess()">Save</button>
    </div>
  </div>
</div>

<!-- Session detail modal -->
<div class="modal-overlay" id="m-sess-detail">
  <div class="modal" style="max-width:440px;">
    <div class="modal-header">
      <h3>Session Details</h3>
      <button class="btn-icon" onclick="closeModal('m-sess-detail')">✕</button>
    </div>
    <div class="modal-body" id="sess-detail-body"></div>
    <div class="modal-footer" id="sess-detail-footer"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ──────────────────────────────────────────────────────────────
// DATA
// ──────────────────────────────────────────────────────────────
const COLORS = ['#6366f1','#ec4899','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ef4444','#14b8a6','#f97316','#06b6d4'];
const SC = { scheduled:'#eef2ff', completed:'#dcfce7', cancelled:'#fef2f2', missed:'#fffbeb' };
const ST = { scheduled:'#6366f1', completed:'#16a34a', cancelled:'#dc2626', missed:'#d97706' };
const SL = { scheduled:'Scheduled', completed:'Completed', cancelled:'Cancelled', missed:'Missed' };

let students   = JSON.parse(localStorage.getItem('tp_students') || '[]');
let sessions   = JSON.parse(localStorage.getItem('tp_sessions') || '[]');
let feeRecs    = JSON.parse(localStorage.getItem('tp_fees')     || '[]');

const save = () => {
  localStorage.setItem('tp_students', JSON.stringify(students));
  localStorage.setItem('tp_sessions', JSON.stringify(sessions));
  localStorage.setItem('tp_fees',     JSON.stringify(feeRecs));
};
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const getStu = id => students.find(s => s.id === id);

// ──────────────────────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────────────────────
const todayStr = () => {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
};
const monStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const fmt12  = t => {
  if (!t) return '—';
  const [h,m] = t.split(':').map(Number);
  return `${(h%12)||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
};
const fmtDate = s => {
  const d = new Date(s+'T00:00:00');
  return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
};
const toast = msg => {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2400);
};

// ──────────────────────────────────────────────────────────────
// NAVIGATION
// ──────────────────────────────────────────────────────────────
let curPage = 'dashboard';
function navigate(pg) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+pg).classList.add('active');
  document.getElementById('nav-'+pg).classList.add('active');
  curPage = pg;
  closeSidebar();
  if (pg==='dashboard') renderDash();
  if (pg==='students')  renderStus();
  if (pg==='schedule')  renderSched();
  if (pg==='fees')      renderFees();
}
function toggleSidebar()  { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay-bg').classList.toggle('open'); }
function closeSidebar()   { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay-bg').classList.remove('open'); }
function openModal(id)    { document.getElementById(id).classList.add('open'); }
function closeModal(id)   { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

// ──────────────────────────────────────────────────────────────
// DASHBOARD
// ──────────────────────────────────────────────────────────────
let weekOff = 0;
function renderDash() {
  const today = todayStr();
  const now   = new Date();
  document.getElementById('dash-title').textContent =
    now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // Stats
  const ws = new Date(); ws.setDate(ws.getDate()-ws.getDay());
  const we = new Date(ws); we.setDate(ws.getDate()+6);
  const wsStr = ws.toISOString().slice(0,10), weStr = we.toISOString().slice(0,10);
  const cm = monStr(now);
  document.getElementById('s-today').textContent = sessions.filter(s=>s.date===today && s.status!=='cancelled').length;
  document.getElementById('s-week').textContent  = sessions.filter(s=>s.date>=wsStr&&s.date<=weStr&&s.status!=='cancelled').length;
  document.getElementById('s-stu').textContent   = students.length;
  document.getElementById('s-mon').textContent   = sessions.filter(s=>s.date.startsWith(cm)&&s.status!=='cancelled').length;

  // Week grid
  const anchor = new Date(); anchor.setDate(anchor.getDate()+weekOff*7);
  const start  = new Date(anchor); start.setDate(anchor.getDate()-anchor.getDay());
  const days   = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let wHtml = '';
  for (let i=0;i<7;i++) {
    const d = new Date(start); d.setDate(start.getDate()+i);
    const ds = d.toISOString().slice(0,10);
    const ss = sessions.filter(x=>x.date===ds&&x.status!=='cancelled');
    const cls = ds===today ? 'today' : ss.length ? 'has-sess' : '';
    wHtml += `<div class="week-col">
      <div class="week-label">${days[i]}</div>
      <div class="week-num ${cls}" onclick="jumpToDay('${ds}')">${d.getDate()}</div>
      <div class="week-dots">${ss.slice(0,3).map(x=>{const s=getStu(x.studentId);return`<div class="week-dot" style="background:${s?.color||'#6366f1'}" title="${s?.name||''}"></div>`;}).join('')}</div>
    </div>`;
  }
  document.getElementById('week-grid').innerHTML = wHtml;

  // Today's sessions
  const ts = sessions.filter(s=>s.date===today).sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));
  document.getElementById('today-list').innerHTML = ts.length
    ? ts.map(s=>{
        const st = getStu(s.studentId);
        return `<div class="session-item">
          <div class="session-dot" style="background:${ST[s.status]||'#6366f1'}"></div>
          <div class="session-info">
            <div class="session-name">${st?.name||'Unknown'}</div>
            <div class="session-sub">${s.subject||''}${st?.parent?' · '+st.parent:''}</div>
          </div>
          <div class="session-right">
            <div class="session-time">${fmt12(s.startTime)}</div>
            <div style="margin-top:3px;"><span class="badge" style="background:${SC[s.status]};color:${ST[s.status]}">${SL[s.status]}</span></div>
            ${st?.phone?`<div style="margin-top:5px;"><a href="tel:${st.phone}" class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 8px;">📞 Call</a></div>`:''}
          </div>
        </div>`;
      }).join('')
    : '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">No sessions today</div>';
}
function jumpToDay(ds) { navigate('schedule'); setTimeout(()=>{ document.getElementById('f-mon').value=ds.slice(0,7); renderSched(); },50); }

// ──────────────────────────────────────────────────────────────
// STUDENTS
// ──────────────────────────────────────────────────────────────
function renderStus() {
  document.getElementById('stu-count').textContent = `${students.length} student${students.length!==1?'s':''}`;
  if (!students.length) {
    document.getElementById('stu-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">No students yet – add one!</div>`;
    return;
  }
  document.getElementById('stu-grid').innerHTML = students.map(s=>{
    const total = sessions.filter(x=>x.studentId===s.id).length;
    const done  = sessions.filter(x=>x.studentId===s.id&&x.status==='completed').length;
    return `<div class="student-card">
      <div class="student-card-top">
        <div class="student-avatar" style="background:${s.color||'#6366f1'}">${s.name[0].toUpperCase()}</div>
        <div>
          <div class="student-name">${s.name}</div>
          <div class="student-meta">${[s.grade,s.subjects].filter(Boolean).join(' · ')}</div>
          ${s.parent?`<div class="student-meta" style="margin-top:1px;">👤 ${s.parent}</div>`:''}
        </div>
      </div>
      <div class="student-card-mid">
        <div style="font-size:12px;color:var(--muted);display:flex;gap:10px;">
          <span>📅 ${total} sessions</span><span>✓ ${done} done</span>
          ${s.fee?`<span>₹${s.fee}/${s.feeType==='monthly'?'mo':'sess'}</span>`:''}
        </div>
        ${s.phone?`<div style="margin-top:8px;"><a href="tel:${s.phone}" class="btn btn-outline btn-sm" style="font-size:11px;">📞 ${s.phone}</a></div>`:''}
      </div>
      <div class="student-card-actions">
        <button class="btn btn-outline btn-sm" onclick="editStu('${s.id}')">✏️ Edit</button>
        <button class="btn btn-danger  btn-sm" onclick="delStu('${s.id}')">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

let pickedColor = COLORS[0];
function renderSwatches(sel) {
  pickedColor = sel;
  document.getElementById('color-swatches').innerHTML = COLORS.map(c=>
    `<div class="color-swatch${c===sel?' sel':''}" style="background:${c}" onclick="renderSwatches('${c}')"></div>`
  ).join('');
}
function openStuModal() {
  document.getElementById('m-stu-title').textContent = 'Add Student';
  document.getElementById('stu-id').value = '';
  ['stu-name','stu-parent','stu-phone','stu-subj','stu-fee'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('stu-grade').value = '';
  document.getElementById('stu-fee-type').value = 'session';
  renderSwatches(COLORS[0]);
  openModal('m-student');
}
function editStu(id) {
  const s = getStu(id); if (!s) return;
  document.getElementById('m-stu-title').textContent = 'Edit Student';
  document.getElementById('stu-id').value       = s.id;
  document.getElementById('stu-name').value     = s.name||'';
  document.getElementById('stu-grade').value    = s.grade||'';
  document.getElementById('stu-parent').value   = s.parent||'';
  document.getElementById('stu-phone').value    = s.phone||'';
  document.getElementById('stu-subj').value     = s.subjects||'';
  document.getElementById('stu-fee').value      = s.fee||'';
  document.getElementById('stu-fee-type').value = s.feeType||'session';
  renderSwatches(s.color||COLORS[0]);
  openModal('m-student');
}
function saveStu() {
  const name = document.getElementById('stu-name').value.trim();
  if (!name) { toast('Name is required'); return; }
  const id  = document.getElementById('stu-id').value;
  const obj = {
    name,
    grade:    document.getElementById('stu-grade').value,
    parent:   document.getElementById('stu-parent').value.trim(),
    phone:    document.getElementById('stu-phone').value.trim(),
    subjects: document.getElementById('stu-subj').value.trim(),
    fee:      parseFloat(document.getElementById('stu-fee').value)||0,
    feeType:  document.getElementById('stu-fee-type').value,
    color:    pickedColor,
  };
  if (id) { const i=students.findIndex(s=>s.id===id); if(i>=0) students[i]={...students[i],...obj}; }
  else students.push({id:uid(),...obj});
  save(); closeModal('m-student'); fillStuDropdowns(); renderStus();
  toast(id?'Student updated!':'Student added!');
}
function delStu(id) {
  if (!confirm('Delete student and all their sessions?')) return;
  students   = students.filter(s=>s.id!==id);
  sessions   = sessions.filter(s=>s.studentId!==id);
  feeRecs    = feeRecs.filter(f=>f.studentId!==id);
  save(); fillStuDropdowns(); renderStus(); toast('Deleted');
}

// ──────────────────────────────────────────────────────────────
// SESSIONS
// ──────────────────────────────────────────────────────────────
function fillStuDropdowns() {
  const opts = students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  document.getElementById('sess-stu').innerHTML   = opts||'<option>No students</option>';
  document.getElementById('f-stu').innerHTML      = `<option value="">All Students</option>${opts}`;
}
function toggleCancelBy() {
  document.getElementById('cancel-by-grp').style.display =
    document.getElementById('sess-status').value==='cancelled' ? 'block' : 'none';
}
function openSessModal(date='') {
  document.getElementById('m-sess-title').textContent = 'Add Session';
  document.getElementById('sess-id').value    = '';
  document.getElementById('sess-date').value  = date||todayStr();
  document.getElementById('sess-start').value = '';
  document.getElementById('sess-end').value   = '';
  document.getElementById('sess-subj').value  = '';
  document.getElementById('sess-lesson').value   = '';
  document.getElementById('sess-comment').value  = '';
  document.getElementById('sess-notes').value    = '';
  document.getElementById('sess-status').value   = 'scheduled';
  document.getElementById('cancel-by-grp').style.display = 'none';
  if (students.length) document.getElementById('sess-stu').selectedIndex=0;
  openModal('m-session');
}
function editSess(id) {
  const s = sessions.find(x=>x.id===id); if (!s) return;
  closeModal('m-sess-detail');
  document.getElementById('m-sess-title').textContent = 'Edit Session';
  document.getElementById('sess-id').value      = s.id;
  document.getElementById('sess-stu').value     = s.studentId;
  document.getElementById('sess-date').value    = s.date;
  document.getElementById('sess-start').value   = s.startTime||'';
  document.getElementById('sess-end').value     = s.endTime||'';
  document.getElementById('sess-subj').value    = s.subject||'';
  document.getElementById('sess-lesson').value  = s.lessonPlan||'';
  document.getElementById('sess-comment').value = s.comment||'';
  document.getElementById('sess-notes').value   = s.notes||'';
  document.getElementById('sess-status').value  = s.status;
  document.getElementById('sess-cby').value     = s.cancelledBy||'tutor';
  document.getElementById('cancel-by-grp').style.display = s.status==='cancelled'?'block':'none';
  openModal('m-session');
}
function saveSess() {
  const stuId = document.getElementById('sess-stu').value;
  const date  = document.getElementById('sess-date').value;
  if (!stuId||!date) { toast('Student & date required'); return; }
  const id     = document.getElementById('sess-id').value;
  const status = document.getElementById('sess-status').value;
  const obj = {
    studentId: stuId, date,
    startTime:  document.getElementById('sess-start').value,
    endTime:    document.getElementById('sess-end').value,
    subject:    document.getElementById('sess-subj').value.trim(),
    lessonPlan: document.getElementById('sess-lesson').value.trim(),
    comment:    document.getElementById('sess-comment').value.trim(),
    notes:      document.getElementById('sess-notes').value.trim(),
    status,
    cancelledBy: status==='cancelled' ? document.getElementById('sess-cby').value : null,
  };
  if (id) { const i=sessions.findIndex(x=>x.id===id); if(i>=0) sessions[i]={...sessions[i],...obj}; }
  else sessions.push({id:uid(),...obj});
  save(); closeModal('m-session');
  if (curPage==='dashboard') renderDash();
  if (curPage==='schedule')  renderSched();
  if (curPage==='fees')      renderFees();
  toast(id?'Session updated!':'Session added!');
}
function delSess(id) {
  if (!confirm('Delete session?')) return;
  sessions=sessions.filter(s=>s.id!==id); save();
  closeModal('m-sess-detail');
  if (curPage==='dashboard') renderDash();
  if (curPage==='schedule')  renderSched();
  if (curPage==='fees')      renderFees();
  toast('Session deleted');
}
function viewSess(id) {
  const s=sessions.find(x=>x.id===id); if(!s) return;
  const st=getStu(s.studentId);
  document.getElementById('sess-detail-body').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="font-weight:700">${st?.name||'Unknown'} &nbsp;<span class="badge" style="background:${SC[s.status]};color:${ST[s.status]}">${SL[s.status]}</span></div>
      <div style="font-size:13px;color:var(--muted)">${fmtDate(s.date)} · ${fmt12(s.startTime)} – ${fmt12(s.endTime)}</div>
      ${s.subject?`<div><b>Subject:</b> ${s.subject}</div>`:''}
      ${s.lessonPlan?`<div style="background:#f0f9ff;border-radius:8px;padding:10px 12px;font-size:13px">📚 ${s.lessonPlan}</div>`:''}
      ${s.comment?`<div style="background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:13px;color:#78350f">💬 ${s.comment}</div>`:''}
      ${s.notes?`<div style="background:var(--bg);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--muted)">🔒 ${s.notes}</div>`:''}
      ${s.cancelledBy?`<div style="font-size:12px;color:var(--muted)">Cancelled by: ${s.cancelledBy}</div>`:''}
    </div>`;
  document.getElementById('sess-detail-footer').innerHTML=`
    <button class="btn btn-outline" onclick="closeModal('m-sess-detail')">Close</button>
    <button class="btn btn-outline" onclick="editSess('${id}')">✏️ Edit</button>
    <button class="btn btn-danger"  onclick="delSess('${id}')">🗑 Delete</button>`;
  openModal('m-sess-detail');
}

// ──────────────────────────────────────────────────────────────
// SCHEDULE
// ──────────────────────────────────────────────────────────────
function fillMonthFilter() {
  const all = [...new Set(sessions.map(s=>s.date.slice(0,7)))].sort().reverse();
  const cur = monStr(new Date());
  if (!all.includes(cur)) all.unshift(cur);
  const sel = document.getElementById('f-mon');
  const was = sel.value||cur;
  sel.innerHTML = all.map(m=>`<option value="${m}"${m===was?' selected':''}>${new Date(m+'-01').toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</option>`).join('');
}
function renderSched() {
  fillMonthFilter();
  const fs = document.getElementById('f-stu').value;
  const fm = document.getElementById('f-mon').value||monStr(new Date());
  const fst= document.getElementById('f-sta').value;
  const rows = sessions
    .filter(s=>(!fs||s.studentId===fs)&&s.date.startsWith(fm)&&(!fst||s.status===fst))
    .sort((a,b)=>a.date.localeCompare(b.date)||(a.startTime||'').localeCompare(b.startTime||''));
  document.getElementById('sched-body').innerHTML = rows.length
    ? rows.map(s=>{const st=getStu(s.studentId);return`<tr>
        <td>${fmtDate(s.date)}</td>
        <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${st?.color||'#6366f1'};margin-right:6px;vertical-align:middle;"></span>${st?.name||'?'}</td>
        <td>${fmt12(s.startTime)}${s.endTime?' – '+fmt12(s.endTime):''}</td>
        <td>${s.subject||'—'}</td>
        <td><span class="badge" style="background:${SC[s.status]};color:${ST[s.status]}">${SL[s.status]}</span></td>
        <td><button class="btn btn-outline btn-sm" onclick="viewSess('${s.id}')">View</button></td>
      </tr>`;}).join('')
    : `<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted)">No sessions found</td></tr>`;
}

// ──────────────────────────────────────────────────────────────
// FEES
// ──────────────────────────────────────────────────────────────
let feeOff = 0;
function renderFees() {
  const d = new Date(); d.setMonth(d.getMonth()+feeOff);
  const cm = monStr(d);
  document.getElementById('fee-month-lbl').textContent = d.toLocaleDateString('en-IN',{month:'long',year:'numeric'});

  if (!students.length) {
    document.getElementById('fee-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--muted)">No students yet</div>`;
    document.getElementById('fee-summary').innerHTML='';
    return;
  }

  let totExp=0, totPaid=0;
  const cards = students.map(s=>{
    const fId  = `${s.id}_${cm}`;
    const fRec = feeRecs.find(f=>f.id===fId)||{id:fId,studentId:s.id,month:cm,paid:false};
    const plan = sessions.filter(x=>x.studentId===s.id&&x.date.startsWith(cm)&&!(x.status==='cancelled'&&x.cancelledBy==='student')).length;
    const amt  = s.feeType==='monthly'?(s.fee||0):(s.fee||0)*plan;
    totExp+=amt; if(fRec.paid) totPaid+=amt;
    return {s,fRec,fId,amt,plan};
  });

  document.getElementById('fee-summary').innerHTML=`
    <div class="card" style="flex:1;min-width:130px;"><div class="card-title">Expected</div><div style="font-size:20px;font-weight:800">₹${Math.round(totExp).toLocaleString('en-IN')}</div></div>
    <div class="card" style="flex:1;min-width:130px;"><div class="card-title">Collected</div><div style="font-size:20px;font-weight:800;color:var(--success)">₹${Math.round(totPaid).toLocaleString('en-IN')}</div></div>
    <div class="card" style="flex:1;min-width:130px;"><div class="card-title">Pending</div><div style="font-size:20px;font-weight:800;color:var(--danger)">₹${Math.round(totExp-totPaid).toLocaleString('en-IN')}</div></div>`;

  document.getElementById('fee-grid').innerHTML=cards.map(({s,fRec,fId,amt,plan})=>`
    <div class="fee-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div style="width:34px;height:34px;border-radius:50%;background:${s.color||'#6366f1'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;">${s.name[0].toUpperCase()}</div>
        <div><div class="fee-name">${s.name}</div><div class="fee-detail">${s.grade||''}</div></div>
      </div>
      <div class="fee-amount">₹${Math.round(amt).toLocaleString('en-IN')}</div>
      <div class="fee-detail" style="margin-bottom:10px;">${s.feeType==='monthly'?'Monthly fee':`₹${s.fee}/session × ${plan} sessions`}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span class="badge ${fRec.paid?'badge-success':'badge-warning'}">${fRec.paid?'✓ Paid':'⏳ Pending'}</span>
        <button class="btn btn-sm ${fRec.paid?'btn-outline':'btn-primary'}" onclick="toggleFee('${fId}','${s.id}')">${fRec.paid?'Mark Unpaid':'Mark Paid'}</button>
      </div>
    </div>`).join('');
}
function toggleFee(fId,stuId) {
  const d=new Date(); d.setMonth(d.getMonth()+feeOff);
  const i=feeRecs.findIndex(f=>f.id===fId);
  if (i>=0) feeRecs[i].paid=!feeRecs[i].paid;
  else feeRecs.push({id:fId,studentId:stuId,month:monStr(d),paid:true});
  save(); renderFees(); toast('Fee updated!');
}

// ──────────────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────────────
fillStuDropdowns();
renderDash();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/Projects/sw.js'));
}
</script>
</body>
